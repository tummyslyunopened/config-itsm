{% extends 'tickets/base.html' %}
{% block title %}Log in — ITSM{% endblock %}
{% block content %}
<div style="max-width:360px;margin:4rem auto;">
  <div class="card">
    <h1>Log in</h1>
    <form method="post">
      {% csrf_token %}
      {% for field in form %}
        <label>{{ field.label }}</label>
        {{ field }}
        {% if field.errors %}<p style="color:#b91c1c;font-size:12px;margin-top:4px;">{{ field.errors.0 }}</p>{% endif %}
      {% endfor %}
      <div class="mt2">
        <button type="submit" class="btn btn-primary" style="width:100%;">Log in</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
